name: Continuous Training Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện (Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc-gdrive
     
      - name: Kéo dữ liệu từ Google Drive qua DVC
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          # Đổ dữ liệu từ két sắt ra một file json tạm thời trên server
          echo "$GDRIVE_CREDENTIALS_DATA" > gdrive_credentials.json
        
          # Ép DVC sử dụng Service Account thay vì tài khoản cá nhân
          dvc remote modify --local gdrive gdrive_use_service_account true
          dvc remote modify --local gdrive gdrive_service_account_json_file_path gdrive_credentials.json
        
          # Kéo data về
          dvc pull
          
      - name: Chạy script huấn luyện mô hình
        run: |
          python src/train.py