name: Continuous Training Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện (Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

    # Tạm thời chúng ta sẽ bỏ qua bước dvc pull để hệ thống chạy thử luồng code trước
      - name: Chạy script huấn luyện mô hình
        run: |
          python src/train.py